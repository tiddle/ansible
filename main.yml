---
# AIDEV-NOTE: Replaced with_items with loop to avoid deprecation warning with loop_control
- name: DotFiles Config
  hosts: localhost
  connection: local

  pre_tasks:
      - name: Detect Host User
        ansible.builtin.import_tasks: pre_tasks/whoami.yml
        tags:
            - always

  tasks:
      - name: Set roles
        ansible.builtin.set_fact:
            run_roles: "{{ ansible_run_tags != ['all'] and ansible_run_tags or default_roles | difference(exclude_roles | default([])) }}"
        tags:
            - always

      - name: Display roles
        ansible.builtin.debug:
            var: run_roles
        tags:
            - always

      - name: Run roles
        include_role:
            apply:
                tags:
                    - '{{ roles_item }}'
            name: '{{ roles_item }}'
        loop: '{{ run_roles }}'
        loop_control:
            loop_var: roles_item
        tags:
            - always
