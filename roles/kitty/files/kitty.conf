font_family      DroidSansM Nerd Font Mono
font_size        13.0
scrollback_lines 10000
enable_audio_bell no
copy_on_select   yes
window_padding_width 8
confirm_os_window_close 0
background_opacity 0.95

# Catppuccin Mocha colours (matches the old alacritty theme)
foreground            #CDD6F4
background            #1E1E2E
selection_foreground  #1E1E2E
selection_background  #F5E0DC
cursor                #F5E0DC

# normal
color0  #45475A
color1  #F38BA8
color2  #A6E3A1
color3  #F9E2AF
color4  #89B4FA
color5  #F5C2E7
color6  #94E2D5
color7  #BAC2DE

# bright
color8  #585B70
color9  #F38BA8
color10 #A6E3A1
color11 #F9E2AF
color12 #89B4FA
color13 #F5C2E7
color14 #94E2D5
color15 #A6ADC8

# tab bar
tab_bar_style powerline

# keybindings
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+enter new_window_with_cwd
