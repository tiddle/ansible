---
# AIDEV-NOTE: Fixed ignore_errors to ansible_check_mode; added tags; standardised paths
- name: Check if thefuck is installed
  shell: command -v thefuck
  register: thefuck_exists
  ignore_errors: "{{ ansible_check_mode }}"
  changed_when: false
  tags: [thefuck]

- name: Install thefuck homebrew
  when: thefuck_exists is failed
  community.general.homebrew:
      name: thefuck
      state: present
  tags: [thefuck]

- name: Check if thefuck alias is set
  lineinfile:
    state: absent
    path: "{{ ansible_env.HOME }}/.zshrc"
    regexp: "thefuck"
  check_mode: true
  changed_when: false # This just makes things look prettier in the logs
  register: check
  tags: [thefuck]

- name: Define thefuck if undefined
  lineinfile:
    state: present
    path: "{{ ansible_env.HOME }}/.zshrc"
    line: "eval $(thefuck --alias)"
  when: check.found == 0
  tags: [thefuck]
