---
# AIDEV-NOTE: Replaced homebrew install with ansible.builtin.apt (thefuck available via pipx on Ubuntu)
# pipx is the recommended install method; apt provides python3-pip and pipx
- name: Install pipx dependencies
  become: true
  ansible.builtin.apt:
    name:
      - python3-dev
      - python3-pip
      - python3-setuptools
      - pipx
    state: present
    update_cache: true
  tags: [thefuck]

- name: Install thefuck via pipx
  community.general.pipx:
    name: thefuck
    state: present
  tags: [thefuck]

- name: Check if thefuck alias is set
  lineinfile:
    state: absent
    path: "{{ ansible_env.HOME }}/.zshrc"
    regexp: "thefuck"
  check_mode: true
  changed_when: false # This just makes things look prettier in the logs
  register: check
  tags: [thefuck]

- name: Define thefuck if undefined
  lineinfile:
    state: present
    path: "{{ ansible_env.HOME }}/.zshrc"
    line: "eval $(thefuck --alias)"
  when: check.found == 0
  tags: [thefuck]
