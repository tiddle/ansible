---
# AIDEV-NOTE: Replaced 'curl | sh' pipe with get_url + shell pattern to avoid pipefail issues
# Fixed ignore_errors to use ansible_check_mode
# Standardised paths to use ansible_env.HOME
- name: zoxide exists
  shell: 'zoxide --version'
  register: zoxide_exists
  ignore_errors: "{{ ansible_check_mode }}"
  changed_when: false
  tags: [zoxide]

- name: Download zoxide install script
  when: zoxide_exists is failed
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/ajeetdsouza/zoxide/main/install.sh
    dest: /tmp/zoxide-install.sh
    mode: '0755'
    force: true
  tags: [zoxide]

- name: Install zoxide (long task)
  when: zoxide_exists is failed
  become: false
  shell: /tmp/zoxide-install.sh
  args:
    executable: /bin/bash
  tags: [zoxide]

- name: Check if zoxide alias is set
  lineinfile:
    state: absent
    path: "{{ ansible_env.HOME }}/.zshrc"
    regexp: "zoxide init zsh"
  check_mode: true
  changed_when: false # This just makes things look prettier in the logs
  register: check
  tags: [zoxide]

- name: Define zoxide if undefined
  lineinfile:
    state: present
    path: "{{ ansible_env.HOME }}/.zshrc"
    line: "eval \"$(zoxide init zsh)\""
  when: check.found == 0
  tags: [zoxide]
