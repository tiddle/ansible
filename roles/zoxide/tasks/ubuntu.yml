---
# AIDEV-NOTE: Replaced curl/script install with ansible.builtin.apt (zoxide available in apt on Ubuntu 22.04+)
- name: Install zoxide
  become: true
  ansible.builtin.apt:
    name: zoxide
    state: present
    update_cache: true
  tags: [zoxide]

- name: Check if zoxide alias is set
  ansible.builtin.lineinfile:
    state: absent
    path: "{{ ansible_env.HOME }}/.zshrc"
    regexp: "zoxide init zsh"
  check_mode: true
  changed_when: false # This just makes things look prettier in the logs
  register: check
  tags: [zoxide]

- name: Define zoxide if undefined
  ansible.builtin.lineinfile:
    state: present
    path: "{{ ansible_env.HOME }}/.zshrc"
    line: "eval \"$(zoxide init zsh)\""
  when: check.found == 0
  tags: [zoxide]
