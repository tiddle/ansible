---
# AIDEV-NOTE: OS-conditional install — Ubuntu uses apt+PPA, Arch uses pacman. macOS support removed.
- name: Ubuntu install
  ansible.builtin.include_tasks: ubuntu.yml
  when: ansible_os_family == "Debian"
  tags: [nvim]

- name: Arch Linux install
  ansible.builtin.include_tasks: arch.yml
  when: ansible_os_family == "Archlinux"
  tags: [nvim]
