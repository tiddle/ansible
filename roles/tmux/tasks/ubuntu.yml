---
# AIDEV-NOTE: Switched from generic package module to ansible.builtin.apt with become: true
- name: install tmux
  become: true
  ansible.builtin.apt:
    name: tmux
    state: present
    update_cache: true
  tags: [tmux]

- name: Generate tmux config files
  become: false
  ansible.builtin.template:
      src: .tmux.conf.j2
      dest: "{{ ansible_env.HOME }}/.tmux.conf"
  tags: [tmux]
