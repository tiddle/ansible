---
# AIDEV-NOTE: After this role runs, the user must run `tailscale up` manually to authenticate
- name: Download tailscale apt repo GPG key
  become: true
  ansible.builtin.get_url:
    url: "https://pkgs.tailscale.com/stable/ubuntu/focal.noarmor.gpg"
    dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
    mode: '0644'
  tags: [tailscale]

- name: Add tailscale apt repository
  become: true
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/ubuntu {{ ansible_distribution_release }} main"
    state: present
    filename: tailscale
  tags: [tailscale]

- name: Install tailscale
  become: true
  ansible.builtin.apt:
    name: tailscale
    state: present
    update_cache: true
  tags: [tailscale]

- name: Enable and start tailscaled service
  become: true
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started
  tags: [tailscale]
