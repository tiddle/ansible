---
# AIDEV-NOTE: Fixed 'when: zshrc_exist is failed' to 'when: not zshrc_exist.stat.exists'
# Added tags for all tasks
# Switched from generic package module to ansible.builtin.apt with become: true
- name: install software
  become: true
  ansible.builtin.apt:
    name: zsh
    state: present
    update_cache: true
  tags: [zsh]

- name: Ensure zsh is the default shell
  become: true
  ansible.builtin.user:
      name: '{{ ansible_user_id }}'
      shell: /usr/bin/zsh
      state: present
  tags: [zsh]

- name: ~/.zshrc exists
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.zshrc"
  register: zshrc_exist
  tags: [zsh]

- name: Init ~/.zshrc
  become: false
  when: not zshrc_exist.stat.exists
  ansible.builtin.template:
    src: .zshrc.j2
    dest: "{{ ansible_env.HOME }}/.zshrc"
  tags: [zsh]
