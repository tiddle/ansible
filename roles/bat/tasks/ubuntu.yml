---
# AIDEV-NOTE: Switched from generic package module to ansible.builtin.apt
# On Ubuntu the binary is 'batcat', so a ~/.local/bin/bat symlink is created for convenience
- name: Install bat
  become: true
  ansible.builtin.apt:
    name: bat
    state: present
    update_cache: true
  tags: [bat]

- name: Ensure ~/.local/bin exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.local/bin"
    state: directory
    mode: '0755'
  tags: [bat]

- name: Symlink batcat to bat
  ansible.builtin.file:
    src: /usr/bin/batcat
    dest: "{{ ansible_env.HOME }}/.local/bin/bat"
    state: link
  tags: [bat]

- name: Check if alias is set
  lineinfile:
      state: absent
      path: '{{ ansible_env.HOME }}/.zshrc'
      regexp: 'alias cat=batcat'
  check_mode: true
  changed_when: false # This just makes things look prettier in the logs
  register: check
  tags: [bat]

- name: Define if undefined
  lineinfile:
      state: present
      path: '{{ ansible_env.HOME }}/.zshrc'
      line: 'alias cat=batcat'
  when: check.found == 0
  tags: [bat]
