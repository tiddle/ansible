---
# AIDEV-NOTE: Replaced ~/ with ansible_env.HOME for consistency; added tags
- name: Update and upgrade apt packages
  become: true
  apt:
      upgrade: 'yes'
      update_cache: 'yes'
      cache_valid_time: 86400 #One day
  tags: [system]

- name: install system software
  become: true
  package:
      name:
          - python3-dev
          - python3-pip
          - python3-setuptools
  tags: [system]

- name: Create ~/Documents/workspace directory
  become: false
  file:
      path: "{{ ansible_env.HOME }}/Documents/workspace"
      state: directory
  tags: [system]
