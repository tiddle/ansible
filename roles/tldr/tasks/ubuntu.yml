---
# AIDEV-NOTE: Switched from generic package module to ansible.builtin.apt with become: true
- name: install system software
  become: true
  ansible.builtin.apt:
    name:
      - python3-dev
      - python3-pip
      - python3-setuptools
      - pipx
    state: present
    update_cache: true
  tags: [tldr]

- name: Install tldr python package
  community.general.pipx:
    name: tldr
    state: present
  tags: [tldr]
