---
# AIDEV-NOTE: Replaced deprecated apt_key module with get_url + apt_repository pattern
# Updated repo URL to use download.vscodium.com with signed-by keyrings approach
- name: Add VSCodium GPG key
  ansible.builtin.get_url:
    url: https://gitlab.com/paulcarroty/vscodium-deb-rpm-repo/raw/master/pub.gpg
    dest: /etc/apt/keyrings/vscodium.asc
    mode: '0644'
  become: true
  tags: [codium]

- name: Add VSCodium repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/vscodium.asc] https://download.vscodium.com/debs vscodium main"
    state: present
    filename: vscodium
  become: true
  tags: [codium]

- name: 'Install codium'
  become: true
  apt:
      name: codium
  tags: [codium]
