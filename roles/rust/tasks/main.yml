---
# AIDEV-NOTE: Fixed ignore_errors to use ansible_check_mode; added tags
# Arch Linux uses pacman rustup (arch.yml); other systems use the rustup.rs script installer.
- name: Run Arch Linux Tasks
  ansible.builtin.import_tasks: arch.yml
  when: ansible_os_family == 'Archlinux'
  tags: [rust]

- name: check if cargo is installed
  ansible.builtin.shell: command -v cargo
  register: cargo_exists
  ignore_errors: "{{ ansible_check_mode }}"
  changed_when: false
  when: ansible_os_family != 'Archlinux'
  tags: [rust]

- name: Download Installer
  when: ansible_os_family != 'Archlinux' and cargo_exists is failed
  ansible.builtin.get_url:
    url: https://sh.rustup.rs
    dest: /tmp/sh.rustup.rs
    mode: '0755'
    force: 'yes'
  tags: [rust]

- name: install rust/cargo
  when: ansible_os_family != 'Archlinux' and cargo_exists is failed
  ansible.builtin.shell: /tmp/sh.rustup.rs -y
  args:
    executable: /bin/bash
  tags: [rust]
